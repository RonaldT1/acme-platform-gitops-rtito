apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
  namespace: observability
spec:
  mode: deployment
  replicas: 1
  image: otel/opentelemetry-collector-contrib:0.97.0
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }

      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure]

      k8sobjects:
        objects:
          - name: events
            mode: watch

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20

      batch:
        send_batch_size: 1024
        timeout: 5s

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      resource:
        attributes:
          - key: cluster
            value: bootcamp-rtito-day15-eks
            action: upsert

      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        expected_new_traces_per_sec: 100
        policies:
          - name: errors
            type: status_code
            status_code: { status_codes: [ERROR] }
          - name: slow
            type: latency
            latency: { threshold_ms: 500 }
          - name: probabilistic
            type: probabilistic
            probabilistic: { sampling_percentage: 10 }

    exporters:
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls: { insecure: true }

      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp
        tls: { insecure: true }

      prometheusremotewrite:
        endpoint: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
        resource_to_telemetry_conversion: { enabled: true }

    service:
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, tail_sampling, batch]
          exporters:  [otlp/tempo]

        metrics:
          receivers:  [otlp, k8s_cluster]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [prometheusremotewrite]

        logs:
          receivers:  [otlp, k8sobjects]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [otlphttp/loki]
