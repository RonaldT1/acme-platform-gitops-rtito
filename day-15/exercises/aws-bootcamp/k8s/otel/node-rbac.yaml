apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-collector
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/stats
      - nodes/metrics
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-collector
subjects:
  - kind: ServiceAccount
    name: node-collector
    namespace: observability
