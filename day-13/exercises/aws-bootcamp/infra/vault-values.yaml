global:
  tlsDisable: false

injector:
  enabled: false

server:
  image:
    repository: hashicorp/vault
    tag: "1.15.4"

  serviceAccount:
    create: true
    name: vault
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::711387135481:role/bootcamp-vault

  extraEnvironmentVars:
    VAULT_CACERT: /vault/userconfig/vault-tls/ca.crt
    AWS_REGION: us-east-1

  volumes:
    - name: tls
      secret:
        secretName: vault-tls

  volumeMounts:
    - name: tls
      mountPath: /vault/userconfig/vault-tls
      readOnly: true

  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true

        listener "tcp" {
          address       = "0.0.0.0:8200"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr     = "https://vault-0.vault-internal.vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }

          retry_join {
            leader_api_addr     = "https://vault-1.vault-internal.vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }

          retry_join {
            leader_api_addr     = "https://vault-2.vault-internal.vault.svc.cluster.local:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }
        }

        seal "awskms" {
          region     = "us-east-1"
          kms_key_id = "alias/bootcamp-vault-unseal"
        }

        service_registration "kubernetes" {}

  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              app.kubernetes.io/instance: vault
              component: server
          topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 250m
      memory: 512Mi

    limits:
      cpu: "1"
      memory: 1Gi

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: gp2
