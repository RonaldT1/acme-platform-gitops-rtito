apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      caBundle: ""
      auth:
        kubernetes:
          mountPath: kubernetes
          role: bootcamp-api
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
