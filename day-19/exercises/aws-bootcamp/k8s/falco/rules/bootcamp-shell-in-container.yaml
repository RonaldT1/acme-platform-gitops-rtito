apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: falco
data:
  bootcamp-shell.yaml: |
    - rule: Shell spawned in bootcamp-prod container
      desc: >
        Detect shell execution inside a container in the bootcamp-prod
        namespace.
      condition: >
        evt.type = execve
        and container
        and k8s.ns.name = "bootcamp-prod"
        and proc.name in (sh, bash, dash, ash, zsh, ksh, busybox)
      output: >
        Shell spawned in bootcamp-prod container
        (shell=%proc.name cmdline=%proc.cmdline
         parent=%proc.pname container_name=%container.name
         image=%container.image.repository:%container.image.tag
         k8s_pod=%k8s.pod.name k8s_ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [bootcamp, container, shell]
      source: syscall
