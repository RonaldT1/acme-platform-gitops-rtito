name: Deploy Backend — Production

on:
  workflow_dispatch:
  push:
    branches: [rtito-aquaware]
    paths:
      - 'day-05/exercises/aws-bootcamp/app/**'
      - 'day-05/exercises/aws-bootcamp/docker/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: bootcamp-api
  ECS_CLUSTER: bootcamp-cluster
  ECS_SERVICE: bootcamp-api-service
  APP_DIR: day-05/exercises/aws-bootcamp

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: day-05/exercises/aws-bootcamp/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: day-05/exercises/aws-bootcamp/app/package-lock.json

      - run: npm ci
      - run: npm test --if-present

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: day-05/exercises/aws-bootcamp

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition for rollback
        id: get-current
        run: |
          TASK_DEF=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task_def=$TASK_DEF" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile \
            --build-arg APP_VERSION=$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Create new task definition revision
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition $CURRENT_TASK_DEF \
            --region $AWS_REGION \
            --query 'taskDefinition' > task-definition.json

          jq --arg IMAGE "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" '
            .containerDefinitions[0].image = $IMAGE
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' task-definition.json > new-task-definition.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "new_task_def=$NEW_TASK_DEF" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.new_task_def }} \
            --region $AWS_REGION

      - name: Wait for deployment
        id: wait
        continue-on-error: true
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

      - name: Smoke test
        id: smoke
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        run: |
          HEALTH=$(curl -sf http://${{ secrets.ALB_DNS }}/health | jq -r .status)
          [ "$HEALTH" = "healthy" ] || exit 1

      - name: Rollback on failure
        if: steps.wait.outcome == 'failure' || steps.smoke.outcome == 'failure'
        run: |
          echo "Deployment failed. Rolling back to ${{ steps.get-current.outputs.task_def }}"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.get-current.outputs.task_def }} \
            --region $AWS_REGION
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          exit 1