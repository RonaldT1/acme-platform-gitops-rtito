apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.nameOverride }}
  labels:
    app: {{ .Values.nameOverride }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: {{ .Values.nameOverride }}-success-rate
            args:
              - name: service-name
                value: {{ .Values.nameOverride }}
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: {{ .Values.nameOverride }}-success-rate
            args:
              - name: service-name
                value: {{ .Values.nameOverride }}
        - setWeight: 100
  selector:
    matchLabels:
      app: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.targetPort }}"
    spec:
      containers:
        - name: {{ .Values.nameOverride }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: VERSION
              value: "{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Values.nameOverride }}-success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      successCondition: result[0] >= {{ .Values.rollout.analysis.successThreshold }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        prometheus:
          address: {{ .Values.rollout.analysis.prometheusAddress }}
          query: |
            sum(rate(acme_requests_total{status="2xx"}[1m]))
            /
            sum(rate(acme_requests_total[1m]))
