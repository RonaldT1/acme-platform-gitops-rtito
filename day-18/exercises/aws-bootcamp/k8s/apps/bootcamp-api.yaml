apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootcamp-api
  namespace: bootcamp-excess-media
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bootcamp-api
  template:
    metadata:
      labels:
        app: bootcamp-api
    spec:
      containers:
        - name: bootcamp-api
          image: 711387135481.dkr.ecr.us-east-1.amazonaws.com/bootcamp-api:day18-base
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bootcamp-api
  namespace: bootcamp-excess-media
spec:
  selector:
    app: bootcamp-api
  ports:
    - name: http
      port: 3000
      targetPort: http
