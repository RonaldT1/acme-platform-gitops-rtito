apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: rtito-hello-kustomize
replicas:
  - name: hello
    count: 1
patches:
  - target:
      kind: Deployment
      name: hello
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: ENV
            value: sandbox
