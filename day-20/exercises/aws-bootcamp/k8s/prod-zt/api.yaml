apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: prod-zt
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootcamp-api
  namespace: prod-zt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootcamp-api
  namespace: prod-zt
  labels:
    app: bootcamp-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bootcamp-api
  template:
    metadata:
      labels:
        app: bootcamp-api
        version: v1
    spec:
      serviceAccountName: bootcamp-api
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: 711387135481.dkr.ecr.us-east-1.amazonaws.com/bootcamp-api:b9ed51cc48866e5421f272cb759b89eca8c0295d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - >
                  require('http').get('http://127.0.0.1:3000/healthz', (res) =>
                  process.exit(res.statusCode === 200 ? 0 : 1)).on('error', ()
                  => process.exit(1))
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - >
                  require('http').get('http://127.0.0.1:3000/healthz', (res) =>
                  process.exit(res.statusCode === 200 ? 0 : 1)).on('error', ()
                  => process.exit(1))
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: APP_ENV
              value: prod-zt
            - name: API_VERSION
              value: v1
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bootcamp-api
  namespace: prod-zt
  labels:
    app: bootcamp-api
spec:
  selector:
    app: bootcamp-api
  ports:
    - name: http
      port: 3000
      targetPort: http
      appProtocol: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootcamp-frontend
  namespace: prod-zt
  labels:
    app: bootcamp-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bootcamp-frontend
  template:
    metadata:
      labels:
        app: bootcamp-frontend
    spec:
      serviceAccountName: frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: curl
          image: curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          command:
            - sleep
            - infinity
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
